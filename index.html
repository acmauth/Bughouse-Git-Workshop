<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Git Training</title>
        <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
        <style>
            :root {
                --green:   #00ff88;
                --cyan:    #00eeff;
                --magenta: #ff00cc;
                --yellow:  #ffe600;
                --bg:      #030b0a;
                --panel:   #050f0d;
                --grid:    rgba(0, 255, 136, 0.04);
                --border:  rgba(0, 255, 136, 0.2);
            }

            * { box-sizing: border-box; margin: 0; padding: 0; }

            body {
                font-family: 'Share Tech Mono', monospace;
                background: var(--bg);
                color: var(--green);
                min-height: 100vh;
                padding: 2rem;
                display: flex;
                flex-direction: column;
                align-items: center;
                overflow-x: hidden;
            }

            /* Scanlines */
            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background: repeating-linear-gradient(
                    to bottom,
                    transparent 0px, transparent 2px,
                    rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px
                );
                pointer-events: none;
                z-index: 999;
            }

            /* Grid bg */
            body::after {
                content: '';
                position: fixed;
                inset: 0;
                background-image:
                    linear-gradient(var(--grid) 1px, transparent 1px),
                    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
                background-size: 40px 40px;
                pointer-events: none;
                z-index: 0;
            }

            /* ---- Header ---- */
            header {
                width: 100%;
                max-width: 960px;
                margin-bottom: 2.5rem;
                position: relative;
                z-index: 1;
            }

            .terminal-bar {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                background: #0d1a14;
                border: 1px solid var(--border);
                border-bottom: none;
                border-radius: 8px 8px 0 0;
                padding: 0.5rem 1rem;
            }

            .dot { width: 12px; height: 12px; border-radius: 50%; }
            .dot-r { background: #ff5f57; }
            .dot-y { background: #ffbd2e; }
            .dot-g { background: #28ca41; }

            .terminal-title {
                margin-left: auto;
                font-size: 0.75rem;
                color: rgba(0,255,136,0.4);
                letter-spacing: 0.1em;
            }

            .header-body {
                background: var(--panel);
                border: 1px solid var(--border);
                border-radius: 0 0 8px 8px;
                padding: 2rem 2rem 1.8rem;
            }

            .prompt-line {
                font-size: 0.8rem;
                color: rgba(0,255,136,0.45);
                margin-bottom: 0.6rem;
                letter-spacing: 0.05em;
            }

            h1 {
                font-family: 'Orbitron', monospace;
                font-size: clamp(1.8rem, 4vw, 3rem);
                font-weight: 900;
                letter-spacing: 0.08em;
                background: linear-gradient(90deg, var(--green), var(--cyan), var(--magenta));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                animation: flicker 6s infinite;
            }

            h2 {
                font-size: 0.9rem;
                color: var(--cyan);
                margin-top: 0.8rem;
                letter-spacing: 0.15em;
                text-transform: uppercase;
            }
            h2::before { content: '> '; color: var(--magenta); }

            .blink {
                display: inline-block;
                width: 10px; height: 1.1em;
                background: var(--green);
                margin-left: 4px;
                vertical-align: text-bottom;
                animation: blink 1s step-end infinite;
            }

            /* ---- Stats bar ---- */
            .stats-bar {
                width: 100%;
                max-width: 960px;
                display: flex;
                gap: 1rem;
                margin-bottom: 2rem;
                position: relative;
                z-index: 1;
                flex-wrap: wrap;
            }

            .stat-chip {
                background: rgba(0,255,136,0.05);
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 0.35rem 0.9rem;
                font-size: 0.75rem;
                letter-spacing: 0.1em;
                color: var(--yellow);
            }
            .stat-chip span { color: var(--green); }

            /* ---- Grid ---- */
            #list {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
                gap: 1.2rem;
                width: 100%;
                max-width: 960px;
                position: relative;
                z-index: 1;
            }

            /* ---- Card ---- */
            .member {
                background: var(--panel);
                border: 1px solid var(--border);
                border-radius: 6px;
                padding: 1.2rem 1.4rem;
                position: relative;
                overflow: hidden;
                transition: border-color 0.2s, box-shadow 0.2s;
                animation: fadeIn 0.4s ease both;
            }

            .member::before {
                content: '';
                position: absolute;
                top: 0; left: 0; right: 0;
                height: 2px;
                background: linear-gradient(90deg, var(--green), var(--cyan), var(--magenta));
                opacity: 0;
                transition: opacity 0.2s;
            }

            .member:hover { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,238,255,0.12); }
            .member:hover::before { opacity: 1; }

            .member::after {
                content: '';
                position: absolute;
                bottom: 0; right: 0;
                width: 18px; height: 18px;
                border-bottom: 2px solid var(--magenta);
                border-right: 2px solid var(--magenta);
                opacity: 0.4;
            }

            .card-top {
                display: flex;
                align-items: center;
                gap: 1rem;
                margin-bottom: 1rem;
            }

            .avatar {
                width: 48px; height: 48px;
                flex-shrink: 0;
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .avatar::before {
                content: '';
                position: absolute;
                inset: 0;
                border-radius: 4px;
                background: linear-gradient(135deg, var(--green), var(--cyan), var(--magenta), var(--yellow));
                z-index: 0;
                animation: spin 4s linear infinite;
            }

            .avatar-inner {
                position: relative;
                z-index: 1;
                width: 40px; height: 40px;
                background: var(--bg);
                border-radius: 3px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: 'Orbitron', monospace;
                font-size: 1.1rem;
                font-weight: 700;
            }

            .member:nth-child(4n+1) .avatar-inner { color: var(--green); }
            .member:nth-child(4n+2) .avatar-inner { color: var(--cyan); }
            .member:nth-child(4n+3) .avatar-inner { color: var(--magenta); }
            .member:nth-child(4n+4) .avatar-inner { color: var(--yellow); }

            .info { flex: 1; min-width: 0; }

            .info h3 {
                font-family: 'Orbitron', monospace;
                font-size: 0.85rem;
                font-weight: 700;
                letter-spacing: 0.08em;
                color: #fff;
                word-break: break-word;
                margin-bottom: 0.15rem;
            }

            .member-id {
                font-size: 0.65rem;
                color: rgba(0,255,136,0.35);
                letter-spacing: 0.1em;
            }

            .card-divider {
                height: 1px;
                background: linear-gradient(90deg, var(--border), transparent);
                margin-bottom: 0.85rem;
            }

            /* ---- Dynamic fields ---- */
            .field {
                margin-bottom: 0.65rem;
                font-size: 0.78rem;
                line-height: 1.5;
            }
            .field:last-child { margin-bottom: 0; }

            .field-key {
                font-size: 0.65rem;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                margin-bottom: 0.2rem;
            }
            .field-key::before { content: '// '; opacity: 0.5; }

            .field:nth-child(odd)  .field-key { color: var(--magenta); }
            .field:nth-child(even) .field-key { color: var(--cyan); }

            .field-value { color: #aaffdd; }

            /* Arrays → tag pills */
            .tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.25rem; }

            .tag {
                background: rgba(0,255,136,0.08);
                border: 1px solid rgba(0,255,136,0.2);
                border-radius: 3px;
                padding: 0.15rem 0.5rem;
                font-size: 0.72rem;
                color: var(--green);
                letter-spacing: 0.05em;
            }

            /* Nested objects → key: value lines */
            .obj-line { color: #aaffdd; }
            .obj-line .obj-key { color: var(--yellow); }

            /* ---- Animations ---- */
            @keyframes blink   { 0%,100%{opacity:1} 50%{opacity:0} }
            @keyframes spin    { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
            @keyframes flicker { 0%,95%,100%{opacity:1} 96%{opacity:.85} 97%{opacity:1} 98%{opacity:.9} }
            @keyframes fadeIn  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

            .member:nth-child(1){animation-delay:.05s} .member:nth-child(2){animation-delay:.1s}
            .member:nth-child(3){animation-delay:.15s} .member:nth-child(4){animation-delay:.2s}
            .member:nth-child(5){animation-delay:.25s} .member:nth-child(6){animation-delay:.3s}
            .member:nth-child(7){animation-delay:.35s} .member:nth-child(8){animation-delay:.4s}
            .member:nth-child(9){animation-delay:.45s} .member:nth-child(10){animation-delay:.5s}

            footer {
                margin-top: 3rem;
                font-size: 0.7rem;
                color: rgba(0,255,136,0.2);
                letter-spacing: 0.12em;
                position: relative;
                z-index: 1;
            }

            @media (max-width: 540px) {
                body { padding: 1rem; }
                .card-top { flex-direction: column; align-items: flex-start; }
            }
        </style>
    </head>
    <body>

        <header>
            <div class="terminal-bar">
                <div class="dot dot-r"></div>
                <div class="dot dot-y"></div>
                <div class="dot dot-g"></div>
                <span class="terminal-title">bash — 80×24</span>
            </div>
            <div class="header-body">
                <div class="prompt-line">root@devbox:~$ ./git-training --list-members</div>
                <h1>GIT TRAINING<span class="blink"></span></h1>
                <h2>People &amp; Fun Facts</h2>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat-chip">STATUS <span>● ONLINE</span></div>
            <div class="stat-chip">SESSION <span>ACTIVE</span></div>
            <div class="stat-chip">BRANCH <span>main</span></div>
            <div class="stat-chip">ENV <span>TRAINING</span></div>
        </div>

        <div id="list"></div>

        <footer>// END OF FILE — SYSTEM READY</footer>

        <script src="./data.js"></script>
        <script src="./script.js"></script>
    </body>
</html>
